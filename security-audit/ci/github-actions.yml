# GitHub Actions Workflow for Security Audit
# Copy this file to .github/workflows/security-audit.yml

name: Security Audit

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly security scan
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  security-audit:
    name: Run Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git checks

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Make audit script executable
        run: chmod +x ./security-audit/security-audit.sh

      - name: Run Security Audit
        id: audit
        run: |
          ./security-audit/security-audit.sh -p . -f all -o ./security-report -v
        continue-on-error: true

      - name: Parse Audit Results
        id: parse
        if: always()
        run: |
          if [ -f ./security-report/security-report.json ]; then
            CRITICAL=$(cat ./security-report/security-report.json | jq '.summary.critical')
            HIGH=$(cat ./security-report/security-report.json | jq '.summary.high')
            MEDIUM=$(cat ./security-report/security-report.json | jq '.summary.medium')
            TOTAL=$(cat ./security-report/security-report.json | jq '.summary.total_findings')
            READY=$(cat ./security-report/security-report.json | jq '.production_ready')

            echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
            echo "high=$HIGH" >> $GITHUB_OUTPUT
            echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "ready=$READY" >> $GITHUB_OUTPUT
          fi

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report-${{ github.sha }}
          path: ./security-report/
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const critical = '${{ steps.parse.outputs.critical }}' || '0';
            const high = '${{ steps.parse.outputs.high }}' || '0';
            const medium = '${{ steps.parse.outputs.medium }}' || '0';
            const total = '${{ steps.parse.outputs.total }}' || '0';
            const ready = '${{ steps.parse.outputs.ready }}' === 'true';

            let status = ready ? '✅' : '❌';
            let statusText = ready ? 'Ready for production' : 'Security issues found';

            const body = `## Security Audit Report ${status}

            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | ${critical} |
            | 🟠 High | ${high} |
            | 🟡 Medium | ${medium} |
            | **Total** | **${total}** |

            **Status:** ${statusText}

            ${!ready ? '⚠️ Please resolve critical and high severity issues before merging.' : ''}

            📄 [View full report](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail on Critical Issues
        if: steps.parse.outputs.critical > 0
        run: |
          echo "::error::Critical security vulnerabilities detected!"
          exit 1

      - name: Warn on High Issues
        if: steps.parse.outputs.high > 0
        run: |
          echo "::warning::High severity security issues detected. Review before deployment."

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [security-audit]
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - name: Send notification
        run: |
          echo "Security audit failed on main branch!"
          # Add your notification logic here (Slack, email, etc.)
