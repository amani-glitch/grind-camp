<!DOCTYPE html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>THE GRIND CAMP | Travail - Rigueur - Respect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;600;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              grind: {
                black: '#0B0B0B',
                dark: '#121212',
                orange: '#FF6A00',
                fire: '#C84A00',
                gray: '#1E1E1E'
              }
            },
            fontFamily: {
              display: ['Anton', 'sans-serif'],
              subhead: ['Oswald', 'sans-serif'],
              body: ['Inter', 'sans-serif'],
            },
            backgroundImage: {
              'grunge-texture': "url('https://www.transparenttextures.com/patterns/cubes.png')", 
              'fire-gradient': 'linear-gradient(to right bottom, #FF6A00, #C84A00)'
            },
            animation: {
              'explosion': 'explosion 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              'explosion': {
                '0%': { transform: 'scale(0)', opacity: '0' },
                '70%': { transform: 'scale(1.1)', opacity: '1' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0B0B0B;
        color: #ffffff;
      }
      .grind-glow {
        box-shadow: 0 0 20px -5px rgba(255, 106, 0, 0.5);
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
